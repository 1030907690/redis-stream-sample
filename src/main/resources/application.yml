spring:
  application:
    name: redis-stream-sample
  data:
    redis:
      # Redis服务器地址
      host: 127.0.0.1
      # Redis服务器连接端口
      port: 6379
      # Redis数据库索引（默认为0）
      database: 0
      # Redis服务器连接密码（默认为空）
      password: root
      # 连接超时时间
      timeout: 10000ms
      # Lettuce连接池配置
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 100
          # 连接池最大阻塞等待时间
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0


server:
  port: 8080

# 日志配置
logging:
  level:
    com.zzq: debug

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  # 分组配置
  group-configs:
    - group: "index"
      paths-to-match: "/api/index/**"
    - group: "user"
      paths-to-match: "/api/user/**"

knife4j:
  # 增强
  enable: true
  basic:
    enable: false
    username: zzq
    password: zzq
  setting:
    language: zh_cn
    enable-footer-custom: true
    footer-custom-content: zzq
    swagger-model-name: 实体类列表
    enable-group: true
    enable-search: true






